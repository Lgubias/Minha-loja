<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAVIEN</title>

<style>
body {
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background:#f5f1ed;
  color:#333;
}

/* HEADER */
header {
  background:white;
  padding:20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid #eee;
}

header h1 {
  margin:0;
  font-weight:600;
}

.cart-btn {
  cursor:pointer;
  background:black;
  color:white;
  padding:8px 15px;
  border-radius:20px;
}

/* HERO */
.hero {
  background:#c8a27a;
  color:white;
  text-align:center;
  padding:80px 20px;
}

.hero h2 {
  font-size:40px;
  margin-bottom:10px;
}

.hero button {
  padding:12px 25px;
  border:none;
  background:white;
  color:black;
  border-radius:20px;
  cursor:pointer;
}

/* GRID PRODUTOS */
.grid {
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
  gap:20px;
  padding:30px;
}

.card {
  background:white;
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.card img {
  width:100%;
  height:220px;
  object-fit:cover;
}

.card-content {
  padding:15px;
}

.card h3 {
  margin:0;
  font-size:18px;
}

.card p {
  margin:10px 0;
}

.card button {
  width:100%;
  padding:10px;
  background:black;
  color:white;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

/* CARRINHO */
.cart {
  position:fixed;
  right:-350px;
  top:0;
  width:300px;
  height:100%;
  background:white;
  box-shadow:-5px 0 20px rgba(0,0,0,0.1);
  padding:20px;
  transition:0.3s;
  overflow:auto;
}

.cart.active {
  right:0;
}

.cart h2 {
  margin-top:0;
}

.cart ul {
  list-style:none;
  padding:0;
}

.cart li {
  margin-bottom:10px;
}

.checkout {
  margin-top:20px;
  width:100%;
  padding:12px;
  background:#25D366;
  color:white;
  border:none;
  border-radius:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
<h1>MAVIEN</h1>
<div class="cart-btn" onclick="toggleCart()">Carrinho 🛒</div>
</header>

<div class="hero">
<h2>Nova Coleção</h2>
<p>Moda feminina elegante</p>
<button onclick="scrollToProdutos()">Ver Peças</button>
</div>

<div class="grid" id="produtos"></div>

<!-- CARRINHO -->
<div class="cart" id="cart">
<h2>Carrinho</h2>
<ul id="lista"></ul>
<p><b>Total: R$ <span id="total">0</span></b></p>
<button class="checkout" onclick="finalizar()">Comprar no WhatsApp</button>
</div>

<script>
const produtos = [
{
nome:"Vestido Midi Floral",
preco:189,
img:"https://images.unsplash.com/photo-1520975916090-3105956dac38"
},
{
nome:"Blusa Cetim",
preco:119,
img:"https://images.unsplash.com/photo-1490481651871-ab68de25d43d"
},
{
nome:"Calça Wide Leg",
preco:159,
img:"https://images.unsplash.com/photo-1541099649105-f69ad21f3246"
},
{
nome:"Saia Plissada",
preco:129,
img:"https://images.unsplash.com/photo-1503342217505-b0a15ec3261c"
}
];

let carrinho = [];

function render(){
const div = document.getElementById("produtos");

produtos.forEach((p,i)=>{
div.innerHTML += `
<div class="card">
<img src="${p.img}">
<div class="card-content">
<h3>${p.nome}</h3>
<p>R$ ${p.preco}</p>
<button onclick="add(${i})">Adicionar</button>
</div>
</div>
`;
});
}

function add(i){
carrinho.push(produtos[i]);
updateCart();
}

function updateCart(){
const lista = document.getElementById("lista");
const total = document.getElementById("total");

lista.innerHTML="";
let soma = 0;

carrinho.forEach(p=>{
soma += p.preco;
lista.innerHTML += `<li>${p.nome} - R$ ${p.preco}</li>`;
});

total.innerText = soma;
}

function toggleCart(){
document.getElementById("cart").classList.toggle("active");
}

function scrollToProdutos(){
window.scrollTo({top:500, behavior:"smooth"});
}

function finalizar(){
let texto = "Olá, quero comprar:%0A";

carrinho.forEach(p=>{
texto += `- ${p.nome} (R$ ${p.preco})%0A`;
});

window.open(`https://wa.me/SEUNUMEROAQUI?text=${texto}`);
}

render();
</script>

</body>
</html>
