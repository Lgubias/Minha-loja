<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAVIEN | Loja</title>

<style>
:root{
  --gold:#d6b56d;
  --gold2:#f6e1a3;
  --black:#050505;
  --text:#fff4d8;
  --muted:#c9bfae;
  --line:rgba(214,181,109,.28);
}

*{box-sizing:border-box}

body{
  margin:0;
  background:#050505;
  color:white;
  font-family:Arial, sans-serif;
}

.container{
  width:min(1200px, calc(100% - 32px));
  margin:auto;
}

header{
  background:rgba(0,0,0,.9);
  border-bottom:1px solid var(--line);
  position:sticky;
  top:0;
  z-index:10;
}

.header-inner{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:16px 0;
}

.logo-area{
  display:flex;
  align-items:center;
  gap:14px;
}

.logo-area img{
  width:70px;
  height:70px;
  object-fit:contain;
}

.logo-area strong{
  font-family:Georgia, serif;
  letter-spacing:.22em;
  color:var(--gold2);
  font-size:1.3rem;
}

nav{
  display:flex;
  gap:16px;
  align-items:center;
}

nav a{
  color:var(--muted);
  text-decoration:none;
}

button{
  cursor:pointer;
}

.gold-btn{
  border:none;
  border-radius:999px;
  padding:13px 22px;
  font-weight:bold;
  background:linear-gradient(135deg,var(--gold2),var(--gold));
  color:#111;
}

.dark-btn{
  border:1px solid var(--line);
  border-radius:999px;
  padding:13px 22px;
  background:rgba(255,255,255,.06);
  color:white;
  font-weight:bold;
}

.hero{
  padding:50px 0 30px;
}

.hero-box{
  min-height:650px;
  border-radius:34px;
  overflow:hidden;
  border:1px solid var(--line);
  background:
    linear-gradient(180deg, rgba(0,0,0,.12), rgba(0,0,0,.7)),
    url("foto-inicio.jpg") center 18%/cover no-repeat;
  display:flex;
  align-items:center;
}

.hero-content{
  padding:50px;
  max-width:720px;
}

.hero-content img{
  width:160px;
  margin-bottom:18px;
}

.eyebrow{
  color:var(--gold2);
  letter-spacing:.28em;
  font-weight:bold;
  font-size:.78rem;
}

h1{
  font-family:Georgia, serif;
  font-size:clamp(3rem, 7vw, 6rem);
  letter-spacing:.09em;
  color:var(--gold2);
  margin:14px 0;
}

.hero p{
  max-width:600px;
  color:#f4e8cf;
  line-height:1.8;
  font-size:1.1rem;
}

.actions{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
  margin-top:24px;
}

.section{
  padding:40px 0;
}

.section h2{
  font-family:Georgia, serif;
  font-size:2.4rem;
  color:var(--gold2);
  text-transform:uppercase;
}

.section p{
  color:var(--muted);
}

.filters{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin:22px 0;
}

.filter-btn{
  border:1px solid var(--line);
  background:#111;
  color:var(--muted);
  border-radius:999px;
  padding:11px 18px;
  font-weight:bold;
}

.filter-btn.active{
  background:linear-gradient(135deg,var(--gold2),var(--gold));
  color:#111;
}

.products{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:18px;
}

.card{
  background:#101010;
  border:1px solid var(--line);
  border-radius:22px;
  overflow:hidden;
}

.card-media{
  height:330px;
  background:#111;
  position:relative;
}

.card-media img{
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:center 18%;
}

.badge{
  position:absolute;
  top:12px;
  left:12px;
  background:rgba(0,0,0,.7);
  color:var(--gold2);
  border:1px solid var(--line);
  padding:8px 12px;
  border-radius:999px;
  font-size:.75rem;
}

.card-body{
  padding:18px;
}

.card h3{
  margin:0 0 8px;
}

.price{
  font-family:Georgia, serif;
  color:var(--gold2);
  font-size:1.4rem;
}

.card-actions{
  display:flex;
  gap:10px;
}

.card-actions button{
  flex:1;
  border:none;
  border-radius:12px;
  padding:12px;
  font-weight:bold;
}

.add-btn{
  background:#1b1b1b;
  color:white;
}

.buy-btn{
  background:linear-gradient(135deg,var(--gold2),var(--gold));
  color:#111;
}

.final-box{
  display:grid;
  grid-template-columns:1fr 1fr;
  border:1px solid var(--line);
  border-radius:30px;
  overflow:hidden;
  background:#101010;
}
